backend:
  name: git-gateway
  branch: main

# Where Decap will save uploaded images. `public_folder` is the URL it
# rewrites image references to in the saved markdown.
media_folder: "public/uploads"
public_folder: "/uploads"

# Show preview links inside the CMS
site_url: https://bearimpact.com
display_url: https://bearimpact.com

publish_mode: simple

collections:
  - name: "blog"
    label: "Blog"
    label_singular: "Blog Post"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{date | date('YYYY-MM-DD')}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Tags", name: "tags", widget: "list", required: false, default: [] }
      - { label: "Body", name: "body", widget: "markdown" }
