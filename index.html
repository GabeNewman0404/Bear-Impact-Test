<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bear Impact | Case Growth Systems</title>
    <!-- Favicon / browser tab icon -->
    <link rel="icon" type="image/jpeg" href="/bear-impact-logo.jpg" />
    <link rel="shortcut icon" type="image/jpeg" href="/bear-impact-logo.jpg" />
    <!-- iOS / iPadOS home screen icon -->
    <link rel="apple-touch-icon" href="/bear-impact-logo.jpg" />
    <!-- Android Chrome / PWA — declared inline so we don't need a separate manifest file -->
    <meta name="theme-color" content="#001633" />
    <!--
      Default meta description + Open Graph tags. Per-page overrides are set
      at runtime by src/lib/usePageMeta.js (via useLayoutEffect) and are
      captured by the Puppeteer prerender plugin into each route's static
      HTML. These defaults are the fallback for any route that doesn't
      explicitly call usePageMeta.
    -->
    <meta
      name="description"
      content="Bear Impact builds case growth systems for personal injury law firms — predictable, compounding inbound that replaces ad spend with sovereign authority."
    />
    <meta property="og:site_name" content="Bear Impact" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bear Impact | Case Growth Systems" />
    <meta
      property="og:description"
      content="Bear Impact builds case growth systems for personal injury law firms — predictable, compounding inbound that replaces ad spend with sovereign authority."
    />
    <meta property="og:url" content="https://bearimpact.com/" />
    <meta property="og:image" content="https://bearimpact.com/bear-impact-logo.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bear Impact | Case Growth Systems" />
    <meta
      name="twitter:description"
      content="Bear Impact builds case growth systems for personal injury law firms — predictable, compounding inbound that replaces ad spend with sovereign authority."
    />
    <meta name="twitter:image" content="https://bearimpact.com/bear-impact-logo.jpg" />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- Netlify Identity widget — powers Decap CMS auth at /admin -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!--
      Netlify Forms shadow form. Netlify's form-detection parser only reliably
      scans static HTML in index.html, not React-rendered output. This hidden
      form registers the "contact" form (with the same field names as the React
      form in src/pages/Contact.jsx) so AJAX POSTs from the live page succeed.
      Do not remove — keep field names in sync with the React form.
    -->
    <form
      name="contact"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      hidden
    >
      <input type="text" name="fullName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="firmName" />
      <select name="attorneyCount">
        <option value="1-5"></option>
        <option value="6-15"></option>
        <option value="16-50"></option>
        <option value="51-150"></option>
        <option value="150+"></option>
      </select>
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
